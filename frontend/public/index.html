        <!-- Structured Data: FAQPage -->
        <script type="application/ld+json">
        {
          "@context": "https://schema.org",
          "@type": "FAQPage",
          "@id": "https://www.vocalfitness.org/#faq",          "inLanguage": "it-IT",
          "mainEntity": [
            {
              "@type": "Question",
              "name": "A chi è rivolto Vocal Fitness?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "A executive, manager, professionisti, accademici e personalità pubbliche che vogliono migliorare in modo strutturato l'inglese parlato — pronuncia, prosodia, intelligibilità e performance comunicativa. Adatto sia a programmi B2B aziendali sia a percorsi individuali."
              }
            },
            {
              "@type": "Question",
              "name": "Quanti livelli CEFR copre il metodo?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Speak Right 101 copre tutti i livelli CEFR, da A2 (Elementary) fino a C2 (Mastery), con un protocollo strutturato di 12 lezioni da 60 minuti basato su fonetica articolatoria, training prosodico e condizionamento biomeccanico."
              }
            },
            {
              "@type": "Question",
              "name": "È un corso d'inglese tradizionale?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "No. Vocal Fitness non insegna grammatica o vocabolario: è un metodo scientifico focalizzato sulla produzione orale dell'inglese — articolazione, prosodia e condizionamento meccanico degli organi fonatori. Si integra con (e non sostituisce) i programmi di inglese esistenti."
              }
            },
            {
              "@type": "Question",
              "name": "In quali modalità si svolge il programma?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Online 1:1, One-to-Some (piccoli gruppi), One-to-Many (aule estese) o Blended (online + sessioni in presenza presso la sede del cliente). Tutte le sessioni live sono in HD su piattaforma proprietaria e restano disponibili come registrazione per 12 mesi."
              }
            },
            {
              "@type": "Question",
              "name": "È previsto un certificato finale?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Sì. Al completamento del programma viene rilasciato il certificato \"Vocal Fitness — Speak Right 101\", riconosciuto dall'organizzazione Vocal Fitness e firmato dal Prof. Steve Dapper."
              }
            },
            {
              "@type": "Question",
              "name": "Si può provare prima di acquistare?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Sì. È inclusa una valutazione iniziale gratuita con assessment CEFR diagnostico individuale e una sample session, così da definire baseline, obiettivi e formato del percorso prima dell'avvio."
              }
            }
          ],
